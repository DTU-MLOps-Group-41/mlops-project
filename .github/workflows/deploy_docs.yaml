name: Deploy docs

on:
  push:
    branches:
      - main

permissions:
    contents: write

jobs:
  deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@803947b9bd8e9f986429fa0c5a41c367cd732b41 # v7
      with:
        enable-cache: true
    - name: Install dependencies
      # Only install docs dependencies, excludes all project dependencies
      run: uv sync --frozen --only-group docs

    - name: Deploy docs
      run: uv run --no-sync mkdocs gh-deploy --force --config-file docs/mkdocs.yaml
